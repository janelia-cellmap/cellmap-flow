name: CellMap Flow
description: Real-time neural network inference on EM microscopy data.
version: "0.1.7"

requirements:
  - "pixi>=0.40"

runnables:
  - id: run
  type: service
    name: Run Inference
    description: Run model inference from a YAML configuration file using cellmap_flow_yaml.
    conda_env: cellmap-flow
    command: cellmap_flow_yaml
    parameters:
      - name: Config File
        type: file
        description: Path to YAML config file (defines data_path, models, normalization, etc.)
        required: true

    resources:
      cpus: 4
      gpus: 0
      memory: "32 GB"
      walltime: "08:00"
