<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>CellMap Flow Dashboard</title>
  <!-- Bootstrap 5 (optional, for styling) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dark.css') }}" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      padding: 0;
    }
    
    .app-header {
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .app-logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .app-logo img {
      max-height: 32px;
      width: auto;
    }

    .app-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .action-btn {
      background: transparent;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .action-btn:hover {
      background: #161b22;
      border-color: #8b949e;
      color: #f0f6fc;
    }

    .action-btn.primary {
      background: #238636;
      border-color: #2ea043;
      color: #fff;
    }

    .action-btn.primary:hover {
      background: #2ea043;
      border-color: #3fb950;
    }

    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    .navbar {
      display: none !important;
    }
  </style>
</head>

<body>
  <!-- GitHub Style Header -->
  <div class="app-header">
    <div class="app-logo">
      <img src="https://raw.githubusercontent.com/janelia-cellmap/cellmap-flow/refs/heads/main/img/CMFLOW_dark.png"
        alt="CellMap Flow" />
    </div>
    <div class="app-actions">
      <button class="action-btn" type="button" onclick="toggleDashboard()">
        Toggle Dashboard
      </button>
      <a class="action-btn primary" href="/pipeline-builder" role="button">
        Pipeline Builder
      </a>
    </div>
  </div>

  <div class="content bg-dark text-light">
    <div class="col-9" id="iframe-column" style="flex: 1; display: flex; overflow: hidden; height: 100%;">
      {% if neuroglancer_url %}
        <iframe src="{{ neuroglancer_url }}" style="width:100%;height:100%;border:none;" title="Neuroglancer Data Viewer"
          id="my_iframe">
          Your browser does not support iframes.
        </iframe>
      {% else %}
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a1a;flex-direction:column;gap:20px;">
          <div style="font-size:48px;">🔌</div>
          <div style="font-size:18px;text-align:center;">Neuroglancer Not Available</div>
          <div style="font-size:14px;color:#888;text-align:center;max-width:400px;">
            No Neuroglancer URL configured. Please configure a Neuroglancer instance to view datasets.<br><br>
            You can still use the <a href="/pipeline-builder" style="color:#3b82f6;text-decoration:none;">Pipeline Builder</a> to design your workflow.
          </div>
        </div>
      {% endif %}
    </div>
    <div class="col-3" id="dashboard-column" style="width:350px;flex-shrink:0;border-left:1px solid #333;overflow-y:auto;overflow-x:hidden;height:100%;">
      {% include "_dashboard.html" %}
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/dashboard_script.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
  <!-- shared_submit.js or inside a <script> tag in your base layout -->
  <script>
    document.addEventListener('keydown', function (event) {
      // Check if the key pressed is "Enter"
      if (event.key === "Enter") {
        // Trigger a click event on the button
        document.getElementById("submitAll").click();
      }
    });
    document.addEventListener("DOMContentLoaded", function () {
      // Find all elements with id="submitAll" (there could be 2 if both partials exist)
      const submitAllButtons = document.querySelectorAll("#submitAll");

      // A single function that merges data & sends the fetch
      function handleSubmitAll() {
        // 1) Gather data from input_norm partial
        const inputNorm = (window.gatherInputNormData)
          ? window.gatherInputNormData()
          : {};

        // 2) Gather data from postprocess partial
        const postprocess = (window.gatherPostProcessData)
          ? window.gatherPostProcessData()
          : {};

        // 3) Build final combined payload
        const finalPayload = {
          input_norm: inputNorm,
          postprocess: postprocess,
        };

        console.log("Combined Payload:", finalPayload);

        // 4) Submit via fetch
        fetch("/api/process", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(finalPayload),
        })
          .then((res) => res.json())
          .then((data) => {
            console.log("Server response:", data);
            // Optionally, update logs on each partial if desired:
            const logAreaNorm = document.getElementById("submissionLog_inputNorm");
            if (logAreaNorm) {
              logAreaNorm.value += "Server response:\n" + JSON.stringify(data, null, 2) + "\n";
            }

            const logAreaPost = document.getElementById("submissionLog_postProcess");
            if (logAreaPost) {
              logAreaPost.value += "Server response:\n" + JSON.stringify(data, null, 2) + "\n";
            }
          })
          .catch((err) => {
            console.error("Error:", err);
            alert("Error submitting combined data");
          });
      }

      // Attach the same handler to each #submitAll
      submitAllButtons.forEach((btn) => {
        btn.addEventListener("click", handleSubmitAll);
      });
    });
  </script>

</body>

</html>
